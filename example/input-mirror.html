<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input mirrot</title>
  </head>
  <body>
    <div data-scope="mirror">

      <input
        type="text"
        placeholder="Type something..."
        data-action="input->update"
      >
    
      <p data-target="output"></p>
      
    </div>
    
    <script type="module">
    import { defineScope } from "https://cdn.jsdelivr.net/gh/Rahmad2830/Leaf@v1.0.1/dist/Leaf.min.js"
    
    defineScope("mirror", ({ targets }) => {
      return {
        update({ event }){
          targets.output.textContent = event.target.value
        }
      }
    })
    </script>
  </body>
</html>
